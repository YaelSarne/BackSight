<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BackSight Web</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #111;
      color: white;
      text-align: center;
    }

    h1 {
      margin: 16px 0 8px;
    }

    .controls {
      margin-bottom: 12px;
    }

    button {
      padding: 10px 18px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      margin: 0 6px;
    }

    .stage {
      position: relative;
      display: inline-block;
      width: min(100vw, 1000px);
    }

    video, canvas {
      width: 100%;
      height: auto;
      border-radius: 10px;
    }

    video {
      display: block;
    }

    canvas {
      position: absolute;
      top: 0;
      left: 0;
      pointer-events: none;
    }

    #status {
      margin-top: 10px;
      color: #bbb;
    }
  </style>
</head>
<body>
  <h1>BackSight Web</h1>

  <div class="controls">
    <button id="startBtn">Start Monitoring</button>
    <button id="stopBtn">Stop</button>
  </div>

  <div class="stage">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="overlay"></canvas>
  </div>

  <div id="status">Idle</div>

  <audio id="alertAudio" src="alert.wav" preload="auto"></audio>

  <script type="module" src="app.js"></script>
</body>
</html>
